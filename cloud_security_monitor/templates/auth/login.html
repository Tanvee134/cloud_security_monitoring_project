<!DOCTYPE html>
<!--
  Login Page Template
  ===================
  Standalone auth page (does not extend base.html).
  Features a centered card with email/password login form.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to CloudShield — AI-Powered Cloud Security Monitoring Platform.">
    <title>Sign In — CloudShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <!-- Logo -->
            <div class="auth-logo">
                <i class="bi bi-shield-check"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your CloudShield account</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}" role="alert">
                            <i class="bi {% if category == 'success' %}bi-check-circle{% elif category == 'danger' or category == 'error' %}bi-exclamation-circle{% else %}bi-info-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                <div class="mb-3">
                    <label class="form-label-dark" for="email">Email Address</label>
                    <input type="email" class="form-control-dark" id="email" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="mb-4">
                    <label class="form-label-dark" for="password">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control-dark" id="password" name="password"
                               placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-cyber btn-cyber-primary w-100 justify-content-center" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <span style="color: var(--text-muted); font-size: 0.85rem;">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" style="font-weight: 600;">Create Account</a>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
