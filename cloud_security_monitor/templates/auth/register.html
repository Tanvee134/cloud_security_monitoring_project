<!DOCTYPE html>
<!--
  Register Page Template
  ======================
  Standalone auth page for new user registration.
  Collects name, email, and password with confirmation.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your CloudShield account — AI-Powered Cloud Security Monitoring Platform.">
    <title>Create Account — CloudShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <!-- Logo -->
            <div class="auth-logo">
                <i class="bi bi-shield-plus"></i>
            </div>
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join CloudShield to monitor your infrastructure</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}" role="alert">
                            <i class="bi {% if category == 'success' %}bi-check-circle{% elif category == 'danger' or category == 'error' %}bi-exclamation-circle{% else %}bi-info-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Registration Form -->
            <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                <div class="mb-3">
                    <label class="form-label-dark" for="name">Full Name</label>
                    <input type="text" class="form-control-dark" id="name" name="name"
                           placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark" for="email">Email Address</label>
                    <input type="email" class="form-control-dark" id="email" name="email"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark" for="password">Password</label>
                    <input type="password" class="form-control-dark" id="password" name="password"
                           placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label class="form-label-dark" for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control-dark" id="confirm_password" name="confirm_password"
                           placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-cyber btn-cyber-primary w-100 justify-content-center" id="btnRegister">
                    <i class="bi bi-person-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="text-center mt-4">
                <span style="color: var(--text-muted); font-size: 0.85rem;">
                    Already have an account?
                    <a href="{{ url_for('login') }}" style="font-weight: 600;">Sign In</a>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
