<!--
  Edit Server Template
  ====================
  Pre-populated form to modify an existing server's details.
-->
{% extends "base.html" %}

{% block title %}Edit Server{% endblock %}
{% block page_title %}Edit Server{% endblock %}

{% block content %}
<div class="fade-in">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1>Edit Server</h1>
            <p class="text-muted-custom mb-0" style="font-size: 0.85rem;">
                Update server details for <strong class="text-accent">{{ server.server_name }}</strong>
            </p>
        </div>
        <a href="{{ url_for('servers') }}" class="btn-cyber btn-cyber-secondary">
            <i class="bi bi-arrow-left"></i> Back to Servers
        </a>
    </div>

    <!-- Edit Server Form -->
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <span><i class="bi bi-pencil-square me-2 text-accent"></i>Server Details</span>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('edit_server', server_id=server.id) }}" id="editServerForm">
                        <!-- Server Name -->
                        <div class="mb-3">
                            <label class="form-label-dark" for="server_name">Server Name</label>
                            <input type="text" class="form-control-dark" id="server_name" name="server_name"
                                   value="{{ server.server_name }}" required>
                        </div>

                        <!-- IP Address -->
                        <div class="mb-3">
                            <label class="form-label-dark" for="ip_address">IP Address</label>
                            <input type="text" class="form-control-dark font-mono" id="ip_address" name="ip_address"
                                   value="{{ server.ip_address }}" required pattern="^[a-zA-Z0-9\.\-]+$">
                        </div>

                        <!-- Cloud Provider -->
                        <div class="mb-4">
                            <label class="form-label-dark" for="provider">Cloud Provider</label>
                            <select class="form-select-dark" id="provider" name="provider" required>
                                <option value="AWS" {% if server.provider == 'AWS' %}selected{% endif %}>Amazon Web Services (AWS)</option>
                                <option value="GCP" {% if server.provider == 'GCP' %}selected{% endif %}>Google Cloud Platform (GCP)</option>
                                <option value="Azure" {% if server.provider == 'Azure' %}selected{% endif %}>Microsoft Azure</option>
                                <option value="DigitalOcean" {% if server.provider == 'DigitalOcean' %}selected{% endif %}>DigitalOcean</option>
                                <option value="Linode" {% if server.provider == 'Linode' %}selected{% endif %}>Linode / Akamai</option>
                                <option value="On-Premise" {% if server.provider == 'On-Premise' %}selected{% endif %}>On-Premise</option>
                                <option value="Other" {% if server.provider == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>

                        <!-- Submit -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-cyber btn-cyber-primary flex-grow-1 justify-content-center" id="btnUpdateServer">
                                <i class="bi bi-check-lg"></i>
                                Update Server
                            </button>
                            <a href="{{ url_for('servers') }}" class="btn-cyber btn-cyber-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
