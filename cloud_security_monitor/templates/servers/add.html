<!--
  Add Server Template
  ===================
  Form to register a new server for monitoring.
  Fields: Server Name, IP Address, Cloud Provider.
-->
{% extends "base.html" %}

{% block title %}Add Server{% endblock %}
{% block page_title %}Add Server{% endblock %}

{% block content %}
<div class="fade-in">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1>Add New Server</h1>
            <p class="text-muted-custom mb-0" style="font-size: 0.85rem;">
                Register a new server for security monitoring
            </p>
        </div>
        <a href="{{ url_for('servers') }}" class="btn-cyber btn-cyber-secondary">
            <i class="bi bi-arrow-left"></i> Back to Servers
        </a>
    </div>

    <!-- Add Server Form -->
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <span><i class="bi bi-plus-circle me-2 text-accent"></i>Server Details</span>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_server') }}" id="addServerForm">
                        <!-- Server Name -->
                        <div class="mb-3">
                            <label class="form-label-dark" for="server_name">Server Name</label>
                            <input type="text" class="form-control-dark" id="server_name" name="server_name"
                                   placeholder="e.g., Production Web Server" required>
                        </div>

                        <!-- IP Address -->
                        <div class="mb-3">
                            <label class="form-label-dark" for="ip_address">IP Address</label>
                            <input type="text" class="form-control-dark font-mono" id="ip_address" name="ip_address"
                                   placeholder="e.g., 192.168.1.100 or example.com" required
                                   pattern="^[a-zA-Z0-9\.\-]+$">
                            <small style="color: var(--text-muted); font-size: 0.75rem;">
                                Enter an IP address or hostname
                            </small>
                        </div>

                        <!-- Cloud Provider -->
                        <div class="mb-4">
                            <label class="form-label-dark" for="provider">Cloud Provider</label>
                            <select class="form-select-dark" id="provider" name="provider" required>
                                <option value="" disabled selected>Select a provider</option>
                                <option value="AWS">Amazon Web Services (AWS)</option>
                                <option value="GCP">Google Cloud Platform (GCP)</option>
                                <option value="Azure">Microsoft Azure</option>
                                <option value="DigitalOcean">DigitalOcean</option>
                                <option value="Linode">Linode / Akamai</option>
                                <option value="On-Premise">On-Premise</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <!-- Submit -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-cyber btn-cyber-primary flex-grow-1 justify-content-center" id="btnSubmitServer">
                                <i class="bi bi-plus-lg"></i>
                                Add Server
                            </button>
                            <a href="{{ url_for('servers') }}" class="btn-cyber btn-cyber-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
